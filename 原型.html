<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="filename" content="user_dashboard_premium.html">
    <title>Premium User Dashboard</title>
    
    <!-- Google Fonts: Inter & Outfit -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;600;700&display=swap" rel="stylesheet">
    
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        display: ['Outfit', 'sans-serif'],
                    },
                    colors: {
                        brand: {
                            50: '#f0f4ff',
                            100: '#d9e2ff',
                            600: '#4f46e5',
                            700: '#4338ca',
                        }
                    },
                    boxShadow: {
                        'premium': '0 20px 50px -12px rgba(0, 0, 0, 0.05)',
                        'hover': '0 30px 60px -12px rgba(79, 70, 229, 0.12)',
                    }
                }
            }
        }
    </script>

    <style>
        body {
            background: radial-gradient(circle at top left, #f8fafc, #eff6ff);
            min-height: 100vh;
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.6);
        }
        .card-transition {
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .status-dot-pulse {
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0% { transform: scale(0.95); opacity: 0.8; }
            50% { transform: scale(1.05); opacity: 1; }
            100% { transform: scale(0.95); opacity: 0.8; }
        }
    </style>
</head>
<body class="antialiased text-slate-900 overflow-x-hidden">

    <div class="max-w-[1440px] mx-auto px-12 py-16">
        
        <!-- Header Section -->
        <header class="text-center mb-16 space-y-3">
            <h1 class="text-4xl font-display font-bold tracking-tight text-slate-800">
                欢迎回来，技术狗
            </h1>
            <p class="text-slate-500 font-medium">
                home.welcome_sub • 您的个人数字资产与社区概览
            </p>
        </header>

        <!-- Profile Status Card -->
        <section class="mb-10">
            <div class="glass-card rounded-[32px] p-8 shadow-premium border border-white/80">
                <div class="flex flex-col gap-8">
                    <!-- Top Status Row -->
                    <div class="flex items-center justify-between bg-slate-50/50 rounded-2xl p-6 border border-slate-100/50">
                        <div class="flex items-center gap-6">
                            <div class="relative">
                                <div class="w-20 h-20 rounded-2xl bg-gradient-to-br from-brand-600 to-indigo-400 flex items-center justify-center text-white shadow-lg">
                                    <i data-lucide="code-2" class="w-10 h-10"></i>
                                </div>
                                <div class="absolute -bottom-1 -right-1 w-5 h-5 bg-green-500 border-4 border-white rounded-full status-dot-pulse"></div>
                            </div>
                            <div>
                                <h2 class="text-2xl font-bold text-slate-800">技术狗</h2>
                                <div class="flex items-center gap-2 mt-1">
                                    <span class="inline-block w-2 h-2 bg-green-500 rounded-full"></span>
                                    <span class="text-sm font-semibold text-green-600">当前在线</span>
                                </div>
                            </div>
                        </div>
                        <div class="hidden md:block">
                            <button class="px-6 py-2.5 bg-white border border-slate-200 rounded-xl text-sm font-semibold text-slate-600 hover:bg-slate-50 transition-colors shadow-sm">
                                编辑状态
                            </button>
                        </div>
                    </div>

                    <!-- Details Grid -->
                    <div class="grid grid-cols-1 md:grid-cols-4 gap-4">
                        <div class="bg-white/40 p-5 rounded-2xl border border-white/60">
                            <p class="text-[11px] font-bold text-slate-400 uppercase tracking-widest mb-1">用户ID</p>
                            <p class="text-sm font-mono font-semibold text-slate-700">Cb69OymuG0GshrDM</p>
                        </div>
                        <div class="bg-white/40 p-5 rounded-2xl border border-white/60">
                            <p class="text-[11px] font-bold text-slate-400 uppercase tracking-widest mb-1">角色权限</p>
                            <p class="text-sm font-semibold text-slate-700">高级订阅用户 (User)</p>
                        </div>
                        <div class="bg-white/40 p-5 rounded-2xl border border-white/60">
                            <p class="text-[11px] font-bold text-slate-400 uppercase tracking-widest mb-1">个人昵称</p>
                            <p class="text-sm font-semibold text-slate-700">技术狗</p>
                        </div>
                        <div class="bg-white/40 p-5 rounded-2xl border border-white/60">
                            <p class="text-[11px] font-bold text-slate-400 uppercase tracking-widest mb-1">电子邮箱</p>
                            <p class="text-sm font-semibold text-slate-700">3121601311@qq.com</p>
                        </div>
                    </div>
                </div>
            </div>
        </section>

        <!-- Navigation Grid -->
        <section class="grid grid-cols-1 md:grid-cols-3 gap-6">
            
            <!-- Message Card -->
            <div class="card-transition glass-card hover:shadow-hover hover:-translate-y-2 p-10 rounded-[32px] text-center group cursor-pointer">
                <div class="w-16 h-16 bg-blue-50 text-blue-500 rounded-2xl flex items-center justify-center mx-auto mb-6 group-hover:scale-110 transition-transform duration-300">
                    <i data-lucide="message-square-more" class="w-8 h-8"></i>
                </div>
                <h3 class="text-xl font-bold text-slate-800 mb-2">消息通知</h3>
                <p class="text-slate-400 text-sm font-medium">查看并管理您的实时对话</p>
            </div>

            <!-- Friends Card -->
            <div class="card-transition glass-card hover:shadow-hover hover:-translate-y-2 p-10 rounded-[32px] text-center group cursor-pointer">
                <div class="w-16 h-16 bg-purple-50 text-purple-500 rounded-2xl flex items-center justify-center mx-auto mb-6 group-hover:scale-110 transition-transform duration-300">
                    <i data-lucide="users-round" class="w-8 h-8"></i>
                </div>
                <h3 class="text-xl font-bold text-slate-800 mb-2">好友列表</h3>
                <p class="text-slate-400 text-sm font-medium">寻找志同道合的技术伙伴</p>
            </div>

            <!-- Points Card -->
            <div class="card-transition glass-card hover:shadow-hover hover:-translate-y-2 p-10 rounded-[32px] text-center group cursor-pointer">
                <div class="w-16 h-16 bg-amber-50 text-amber-500 rounded-2xl flex items-center justify-center mx-auto mb-6 group-hover:scale-110 transition-transform duration-300">
                    <i data-lucide="wallet-2" class="w-8 h-8"></i>
                </div>
                <h3 class="text-xl font-bold text-slate-800 mb-2">积分钱包</h3>
                <p class="text-slate-400 text-sm font-medium">管理您的虚拟资产与收益</p>
            </div>

            <!-- Dynamic Card -->
            <div class="card-transition glass-card hover:shadow-hover hover:-translate-y-2 p-10 rounded-[32px] text-center group cursor-pointer">
                <div class="w-16 h-16 bg-rose-50 text-rose-500 rounded-2xl flex items-center justify-center mx-auto mb-6 group-hover:scale-110 transition-transform duration-300">
                    <i data-lucide="layout-dashboard" class="w-8 h-8"></i>
                </div>
                <h3 class="text-xl font-bold text-slate-800 mb-2">动态广场</h3>
                <p class="text-slate-400 text-sm font-medium">发现社区最新的热门分享</p>
            </div>

            <!-- Community Card -->
            <div class="card-transition glass-card hover:shadow-hover hover:-translate-y-2 p-10 rounded-[32px] text-center group cursor-pointer">
                <div class="w-16 h-16 bg-emerald-50 text-emerald-500 rounded-2xl flex items-center justify-center mx-auto mb-6 group-hover:scale-110 transition-transform duration-300">
                    <i data-lucide="globe-2" class="w-8 h-8"></i>
                </div>
                <h3 class="text-xl font-bold text-slate-800 mb-2">开发者社区</h3>
                <p class="text-slate-400 text-sm font-medium">进入技术交流与互助中心</p>
            </div>

            <!-- Profile Settings Card -->
            <div class="card-transition glass-card hover:shadow-hover hover:-translate-y-2 p-10 rounded-[32px] text-center group cursor-pointer">
                <div class="w-16 h-16 bg-slate-100 text-slate-600 rounded-2xl flex items-center justify-center mx-auto mb-6 group-hover:scale-110 transition-transform duration-300">
                    <i data-lucide="user-cog" class="w-8 h-8"></i>
                </div>
                <h3 class="text-xl font-bold text-slate-800 mb-2">个人资料</h3>
                <p class="text-slate-400 text-sm font-medium">更新个人信息与账户偏好</p>
            </div>

        </section>

        <!-- Footer -->
        <footer class="mt-20 text-center">
            <p class="text-slate-400 text-xs">
                &copy; 2024 Pixso AI Dashboard Project. 全力支持您的创意实现。
            </p>
        </footer>
    </div>

    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <script>
        // Initialize Lucide icons
        lucide.createIcons();

        // Optional: Add micro-interaction logic
        document.querySelectorAll('.card-transition').forEach(card => {
            card.addEventListener('mouseenter', () => {
                // Potential for haptic feedback simulation or sound
            });
        });
    </script>
</body>
</html>
