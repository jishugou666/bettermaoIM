version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: bettermao-mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: bettermao
      MYSQL_USER: bettermao
      MYSQL_PASSWORD: bettermaopassword
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    command: --default-authentication-plugin=mysql_native_password

  redis:
    image: redis:7.0-alpine
    container_name: bettermao-redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  # Adminer for database management (Optional but helpful)
  adminer:
    image: adminer
    restart: always
    ports:
      - "8080:8080"
    depends_on:
      - mysql

volumes:
  mysql_data:
  redis_data:
